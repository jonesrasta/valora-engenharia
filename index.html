<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- SEO -->
    <title>
      Valora Engenharia | Soluções em Engenharia
    </title>

    <meta
      name="description"
      content="A Valora Engenharia oferece soluções modernas, estratégicas e inovadoras em engenharia, branding e presença urbana."
    />

    <meta
      name="keywords"
      content="engenharia, branding, engenharia urbana, identidade visual, construção, Valora Engenharia"
    />

    <meta name="author" content="Valora Engenharia" />

    <!-- Theme -->
    <meta name="theme-color" content="#22303E" />

    <!-- Mobile -->
    <meta
      name="format-detection"
      content="telephone=no"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />

    <!-- Font Preload -->
    <link
      rel="preload"
      href="/fonts/NeueMetana-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <link
      rel="preload"
      href="/fonts/NeueMetana-Bold.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Performance -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Valora Engenharia"
    />

    <meta
      property="og:description"
      content="Soluções modernas e estratégicas em engenharia e branding."
    />

    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:image"
      content="/og-image.jpg"
    />

    <!-- Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="Valora Engenharia"
    />

    <meta
      name="twitter:description"
      content="Soluções modernas e estratégicas em engenharia e branding."
    />
  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</html>
